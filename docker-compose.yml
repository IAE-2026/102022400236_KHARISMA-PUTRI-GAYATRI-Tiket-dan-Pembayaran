services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket_app_container
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=ticket_service_db
      - DB_USERNAME=ticket_user
      - DB_PASSWORD=ticket_secret
    depends_on:
      db:
        condition: service_healthy

  webserver:
    image: nginx:alpine
    container_name: ticket_webserver_container
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker-config/nginx:/etc/nginx/conf.d
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: ticket_db_container
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ticket_service_db
      - POSTGRES_USER=ticket_user
      - POSTGRES_PASSWORD=ticket_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d ticket_service_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
