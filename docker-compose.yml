services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ticket-payment-service
    container_name: ticket-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ticket_service_db
      DB_USERNAME: ticket_user
      DB_PASSWORD: ticket_secret
      LIGHTHOUSE_BROADCASTER: log
      LIGHTHOUSE_SUBSCRIPTION_STORAGE: database
      LIGHTHOUSE_QUEUE_BROADCASTS: "false"
      LIGHTHOUSE_QUERY_CACHE_ENABLE: "false"
    networks:
      - ticket-network
    depends_on:
      db:
        condition: service_healthy

  webserver:
    image: nginx:alpine
    container_name: ticket-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker-config/nginx:/etc/nginx/conf.d/
    networks:
      - ticket-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: ticket-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: ticket_service_db
      MYSQL_USER: ticket_user
      MYSQL_PASSWORD: ticket_secret
    ports:
      - "3306:3306"
    volumes:
      - ticket-mysqldata:/var/lib/mysql
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u ticket_user -pticket_secret"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  ticket-network:
    driver: bridge

volumes:
  ticket-mysqldata:
